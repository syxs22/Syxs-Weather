<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#1f2833"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66fcf1"/>
      <stop offset="100%" stop-color="#45a29e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1f2833" stroke-width="8" />

  <!-- Glowing Radar Ring -->
  <circle cx="256" cy="256" r="210" stroke="url(#accentGrad)" stroke-width="4" stroke-dasharray="300 150" filter="url(#glow)" opacity="0.85" />

  <!-- Stylized Earth/Grid Arc at bottom -->
  <path d="M96 350 A 180 180 0 0 0 416 350" stroke="#45a29e" stroke-width="6" stroke-linecap="round" opacity="0.5" />
  <path d="M146 390 A 180 180 0 0 0 366 390" stroke="#45a29e" stroke-width="4" stroke-linecap="round" opacity="0.3" />

  <!-- Radar Waves (Pulsing down from center) -->
  <path d="M216 280 A 50 50 0 0 0 296 280" stroke="#66fcf1" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <path d="M186 310 A 90 90 0 0 0 326 310" stroke="#66fcf1" stroke-width="5" stroke-linecap="round" opacity="0.7" />

  <!-- Satellite Icon in upper center -->
  <g transform="translate(0, -20)">
    <!-- Solar Panels -->
    <!-- Left Panel -->
    <rect x="110" y="195" width="80" height="30" rx="4" fill="#45a29e" stroke="#66fcf1" stroke-width="4" />
    <line x1="150" y1="195" x2="150" y2="225" stroke="#66fcf1" stroke-width="2" />
    <!-- Right Panel -->
    <rect x="322" y="195" width="80" height="30" rx="4" fill="#45a29e" stroke="#66fcf1" stroke-width="4" />
    <line x1="362" y1="195" x2="362" y2="225" stroke="#66fcf1" stroke-width="2" />
    
    <!-- Connectors -->
    <rect x="190" y="206" width="30" height="8" fill="#c0c0c0" />
    <rect x="292" y="206" width="30" height="8" fill="#c0c0c0" />
    
    <!-- Main Body -->
    <rect x="216" y="170" width="80" height="80" rx="12" fill="#ffffff" stroke="#1f2833" stroke-width="6" />
    <!-- Golden/Yellow Sensor Core inside body -->
    <circle cx="256" cy="210" r="16" fill="#f5b041" />
    
    <!-- Dish / Transmitter pointing down -->
    <path d="M236 253 L226 273 H286 L276 253 Z" fill="#c0c0c0" stroke="#1f2833" stroke-width="4" />
    <line x1="256" y1="273" x2="256" y2="285" stroke="#66fcf1" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>